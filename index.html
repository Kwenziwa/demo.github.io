<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>navigator.share API demo</title>
  <style>
    :root {
      --ico-share: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M13.5 11c-.706 0-1.342.293-1.797.763L4.969 8.396C4.99 8.267 5.001 8.135 5.001 8s-.011-.267-.032-.396l6.734-3.367A2.493 2.493 0 0 0 13.5 5 2.5 2.5 0 1 0-2.469-2.104L4.297 6.263A2.493 2.493 0 0 0 2.5 5.5a2.5 2.5 0 1 0 1.797 4.237l6.734 3.367A2.5 2.5 0 1 0 13.5 11Z"/></svg>');
      --ico-facebook: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M9.5 3H12V0H9.5A3.504 3.504 0 0 0 6 3.5V5H4v3h2v8h3V8h2.5l.5-3H9V3.5c0-.271.229-.5.5-.5Z"/></svg>');
      --ico-linkedin: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M6 6h2.767v1.418h.04C9.192 6.727 10.134 6 11.539 6 14.46 6 15 7.818 15 10.183V15h-2.885v-4.27c0-1.018-.021-2.329-1.5-2.329-1.502 0-1.732 1.109-1.732 2.255V15H6V6ZM1 6h3v9H1V6Zm3-2.5A1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/></svg>');
      --ico-twitter: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M16 3.538a6.596 6.596 0 0 1-1.884.516 3.292 3.292 0 0 0 1.444-1.816 6.58 6.58 0 0 1-2.084.797A3.28 3.28 0 0 0 7.798 5.28c0 .256.028.506.084.747A9.315 9.315 0 0 1 1.116 2.596a3.28 3.28 0 0 0 1.015 4.381 3.25 3.25 0 0 1-1.488-.409v.041a3.282 3.282 0 0 0 2.634 3.219 3.29 3.29 0 0 1-1.485.057 3.283 3.283 0 0 0 3.066 2.281A6.583 6.583 0 0 1 .78 13.572c-.266 0-.525-.016-.784-.047A9.29 9.29 0 0 0 5.03 15c6.037 0 9.341-5.003 9.341-9.341l-.009-.425A6.67 6.67 0 0 0 16 3.538Z"/></svg>');
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 2rem;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #fff;
    }

    p {
      max-width: 48rem;
      margin: 0 0 1.5rem;
      line-height: 1.6;
    }

    code {
      padding: .1em .35em;
      border-radius: .25rem;
      background: #f1f3f5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    [data-share] {
      --bdrs: 50%;
      --bgc: lightgrey;
      --bxsh: 0 0 0 2px hsla(210, 24%, 15%, .65);
      --icon: var(--ico-share);
      --icon-bgc: hsl(210, 24%, 35%);
      --icon-size: 60%;
      --m: 0 .5rem;
      --size: 3rem;
      min-height: var(--size);
      margin-left: -.5rem;
    }

    [data-share-item] {
      display: inline-block;
      width: var(--size);
      height: var(--size);
      margin: var(--m);
      padding: 0;
      border: 0;
      border-radius: var(--bdrs);
      outline: none;
      background-color: var(--bgc);
      cursor: pointer;
      vertical-align: middle;
    }

    [data-share-item] i {
      display: inline-block;
      width: 100%;
      height: 100%;
      background-color: var(--icon-bgc);
      mask: no-repeat center / var(--icon-size) var(--icon);
      -webkit-mask: no-repeat center / var(--icon-size) var(--icon);
    }

    [data-share-item]:focus-visible,
    [data-share-item]:hover {
      box-shadow: var(--bxsh);
    }

    [data-share-item="facebook"] i {
      --icon: var(--ico-facebook);
      --icon-bgc: #4267b2;
    }

    [data-share-item="linkedin"] i {
      --icon: var(--ico-linkedin);
      --icon-bgc: #0e76a8;
    }

    [data-share-item="twitter"] i {
      --icon: var(--ico-twitter);
      --icon-bgc: #00acee;
    }
  </style>
</head>

<body>
  <p>If your browser supports <code>navigator.share</code>, you'll see a single share icon below; otherwise, you'll see
    fallback links:</p>

  <div data-share="device facebook twitter linkedin" data-share-label="Share on"
    data-share-device="Share using device sharing"></div>

  <pre id="debug" style="margin-top:1.5rem;padding:1rem;background:#f1f3f5;border-radius:.5rem;font-size:.8rem;word-break:break-all"></pre>

  <script>
    function createElement(type, attributes = {}, children = []) {
      const element = document.createElement(type);

      for (const [key, value] of Object.entries(attributes)) {
        element.setAttribute(key, value);
      }

      for (const child of children) {
        element.appendChild(
          typeof child === 'string' ? document.createTextNode(child) : child
        );
      }

      return element;
    }

    function Share(element) {
      const options = element.dataset.share.trim().split(/\s+/);
      const deviceIndex = options.indexOf('device');
      const pageUrl = location.href;
      const pageTitle = document.title;
      const pageDescription = document.querySelector('meta[name="description"]')?.content || '';

      const nativeShareData = { title: pageTitle, url: pageUrl };
      if (pageDescription) nativeShareData.text = pageDescription;
      // 'share' in navigator is the correct cross-browser detection for iOS Safari and Android Chrome
      const canShare = 'share' in navigator;

      const shareData = {
        facebook: { url: 'https://www.facebook.com/sharer/sharer.php?u=' },
        linkedin: { url: 'https://www.linkedin.com/sharing/share-offsite/?url=' },
        twitter: { url: 'https://twitter.com/intent/tweet?url=' }
      };

      if (deviceIndex > -1 && canShare) {
        const shareButton = createElement('button', {
          type: 'button',
          'aria-label': element.dataset.shareDevice,
          'data-share-item': ''
        }, [createElement('i', { 'aria-hidden': 'true' })]);

        // navigator.share must be called directly in the click handler with no prior awaits
        // to preserve the user gesture on iOS Safari and Android Chrome
        shareButton.addEventListener('click', () => {
          navigator.share(nativeShareData).catch((error) => {
            if (error.name !== 'AbortError') {
              console.error('Sharing failed:', error);
            }
          });
        });

        element.appendChild(shareButton);
        return;
      }

      for (const option of options.filter(option => option !== 'device')) {
        if (!shareData[option]) continue;

        const shareLink = createElement('a', {
          'aria-label': `${element.dataset.shareLabel} ${option}`,
          'data-share-item': option,
          href: shareData[option].url + encodeURIComponent(pageUrl),
          rel: 'noopener noreferrer',
          target: '_blank'
        }, [createElement('i', { 'aria-hidden': 'true' })]);

        element.appendChild(shareLink);
      }
    }

    document.querySelectorAll('[data-share]').forEach(Share);

    document.getElementById('debug').textContent = [
      'share in navigator: ' + ('share' in navigator),
      'protocol: ' + location.protocol,
      'canShare fn: ' + (typeof navigator.canShare),
      'ua: ' + navigator.userAgent
    ].join('\n');
  </script>
</body>

</html>
